[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"

[project]
name = "async-batch-inference"
version = "0.1.0"
description = "Async batch inference engine for OpenAI-compatible APIs"
requires-python = ">=3.9"
dependencies = [
    "openai>=1.0.0",
]

[tool.setuptools]
package-dir = {"async_batch_inference" = "."}
packages = ["async_batch_inference"]
